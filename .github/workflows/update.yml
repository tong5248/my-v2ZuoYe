name: 自动更新节点

on:
  workflow_dispatch:      # 允许手动运行
  schedule:
    # 北京时间 (UTC+8) 上午 10:00 对应 UTC 时间 02:00
    - cron: '0 2- cron: '0 2 * * *' 

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install requests beautifulsoup4

      - name: 执行聚合脚本
        run: python "聚合脚本.py"

      - name: 自动提交更新
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add *.txt
          git commit -m "更新于 $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
